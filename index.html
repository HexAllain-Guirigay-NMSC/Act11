<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fake API Users Table</title>

<style>

/* RESET & BASIC STYLES */
@import url("https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap");

:root {
  --white: #fff;
  --darkblue: #1b4965;
  --lightblue: #edf2f4;
}

*{
padding:0;
margin:0;
box-sizing:border-box;
}

body{
margin:50px 0 120px;
font-family:"Noto Sans",sans-serif;
}

.container{
max-width:1000px;
padding:0 15px;
margin:auto;
}

h1{
font-size:1.5em;
}

/* TABLE STYLES */

.table-wrapper{
overflow-x:auto;
}

.table-wrapper::-webkit-scrollbar{
height:8px;
}

.table-wrapper::-webkit-scrollbar-thumb{
background:var(--darkblue);
border-radius:40px;
}

.table-wrapper::-webkit-scrollbar-track{
background:var(--white);
border-radius:40px;
}

.table-wrapper table{
margin:50px 0 20px;
border-collapse:collapse;
text-align:center;
width:100%;
}

.table-wrapper table th,
.table-wrapper table td{
padding:10px;
min-width:120px;
}

.table-wrapper table th{
color:var(--white);
background:var(--darkblue);
}

.table-wrapper table tbody tr:nth-of-type(even) > *{
background:var(--lightblue);
}

.table-wrapper table td:first-child{
text-align:center;
}

.table-credits{
font-size:12px;
margin-top:10px;
}

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>Fake API Users Information</h1>

<div class="table-wrapper">
<table>

<thead>
<tr>
<th>ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Username</th>
<th>Email</th>
<th>Zipcode</th>
<th>Latitude</th>
<th>Longitude</th>
</tr>
</thead>

<tbody id="userTable">

<!-- MY PERSONAL DATA FIRST -->

<tr>
<td>0</td>
<td>Hex Allain</td>
<td>Guirigay</td>
<td>SkyXD23</td>
<td>hexallain.guirigay@nmsc.edu.ph</td>
<td>7016</td>
<td>7.8257</td>
<td>123.4370</td>
</tr>

</tbody>

</table>
</div>

<p class="table-credits">
Data retrieved from 
<a href="https://jsonplaceholder.typicode.com/users" target="_blank">
JSONPlaceholder Fake API
</a>
</p>

</div>

<footer>
Copyright © Activity 11 MSIT-114
</footer>


<script>

/* FETCH API DATA */

fetch("https://jsonplaceholder.typicode.com/users")

.then(response => response.json())

.then(data => {

const table = document.getElementById("userTable");

data.forEach(user => {

const names = user.name.split(" ");

const firstName = names[0];
const lastName = names.slice(1).join(" ");

const row = `
<tr>
<td>${user.id}</td>
<td>${firstName}</td>
<td>${lastName}</td>
<td>${user.username}</td>
<td>${user.email}</td>
<td>${user.address.zipcode}</td>
<td>${user.address.geo.lat}</td>
<td>${user.address.geo.lng}</td>
</tr>
`;

table.innerHTML += row;

});

});

</script>

</body>
</html>
